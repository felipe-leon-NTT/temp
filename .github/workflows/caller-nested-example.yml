name: Caller - Nested Reusable Workflow Example

on:
  workflow_dispatch:

jobs:
  call-level-1:
    name: Call reusable level 1
    uses: ./.github/workflows/reusable-level-1.yml
    with:
      app_name: vodafone-migration
      environment: dev
    secrets: inherit

  call-level-3-direct:
    name: Call reusable level 3 directly
    uses: ./.github/workflows/reusable-level-3.yml
    with:
      app_name: vodafone-migration
      region: eu-west
      build_id: b20260325
    secrets: inherit

  show-final-output:
    name: Show propagated outputs
    runs-on: ubuntu-latest
    needs:
      - call-level-1
      - call-level-3-direct
    steps:
      - name: Print outputs from reusable workflows
        run: |
          echo "Nested call artifact: ${{ needs.call-level-1.outputs.artifact_name }}"
          echo "Direct call artifact: ${{ needs.call-level-3-direct.outputs.artifact_name }}"
